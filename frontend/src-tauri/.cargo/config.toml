[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=14.2",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=14.2",
]

[env]
MACOSX_DEPLOYMENT_TARGET = { value = "14.2", force = true }
CMAKE_OSX_DEPLOYMENT_TARGET = "14.2"
# Use pre-packaged bindings that match the bundled whisper.cpp source.
# Without this, bindgen picks up the system whisper.cpp 1.8.5 headers which
# have a different API than whisper-rs@0.13.2 expects.
WHISPER_DONT_GENERATE_BINDINGS = "1"